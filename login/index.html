<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
  </head>
  <body>

    <section class="home show">
      <div class="form_container">
        
        <i class="uil uil-times form_close"></i>
        
        <div class="form login_form">
          <form id="loginForm">
            <h2>Silahkan Login</h2>

            <div class="input_box">
              <input type="text" id="username" placeholder="Nama Pengguna .." required="required">
              <i class="uil uil-envelope-alt email"></i>
            </div>
            
            <div class="input_box">
              <input type="password" id="password" placeholder="Password .." required="required">
              <i class="uil uil-lock password"></i>
              <i class="uil uil-eye-slash pw_hide"></i>
            </div>

            <div class="option_field">
              <span class="checkbox">
                <input type="checkbox" id="check" />
                <label for="check">Remember me</label>
              </span>
              <a href="#" class="forgot_pw">Forgot password?</a>
            </div>

            <button type="submit" class="button">Login Now</button>
            
            <div style="margin-top: 15px; text-align: center;">
              <button type="button" class="button" onclick="location.href='../index.html';">Home</button>
            </div>
            
            <div id="alertBox" class="alert" style="display:none;"></div>
          </form>
        </div>

      </div> 
    </section>

    <script src="js/login.js"></script>
  </body>
</html>
